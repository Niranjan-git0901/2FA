<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select 2FA Method - 2FA Security</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-content {
            padding: 40px;
        }

        .method-option {
            margin-bottom: 20px;
        }

        .method-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .method-card:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.2);
        }

        .method-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .method-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .method-description {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .footer {
            padding: 20px 40px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            background: #f8f9fa;
        }

        .footer p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .back-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .container {
                margin: 20px;
            }

            .form-content {
                padding: 25px;
            }

            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Choose 2FA Method</h1>
            <p>Select how you want to receive your verification codes</p>
        </div>

        <div class="form-content">
            <div class="method-option">
                <form method="POST" action="/send-email-otp">
                    <button type="submit" class="method-card">
                        <span class="method-icon">📧</span>
                        <div class="method-title">Email OTP</div>
                        <div class="method-description">
                            Receive a 6-digit code via email to your registered email address.
                        </div>
                    </button>
                </form>
            </div>

            <div class="method-option">
                <form method="GET" action="/setup-qr">
                    <button type="submit" class="method-card">
                        <span class="method-icon">📱</span>
                        <div class="method-title">Google Authenticator</div>
                        <div class="method-description">
                            Use Google Authenticator to scan the QR code and generate secure verification codes.
                        </div>
                    </button>
                </form>
            </div>
        </div>

        <div class="footer">
            <p>Need to change account?</p>
            <a href="/login" class="back-link">← Back to Login</a>
        </div>
    </div>
</body>
</html>
